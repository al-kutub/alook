<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <!-- Background shapes -->
  <rect x="80" y="60" width="140" height="90" rx="4" fill="none" stroke="#8B7E74" stroke-width="2" stroke-dasharray="4 3"/>
  <rect x="580" y="60" width="140" height="90" rx="4" fill="none" stroke="#8B7E74" stroke-width="2" stroke-dasharray="4 3"/>
  <rect x="620" y="250" width="140" height="90" rx="4" fill="none" stroke="#8B7E74" stroke-width="2" stroke-dasharray="4 3"/>
  <rect x="40" y="250" width="140" height="90" rx="4" fill="none" stroke="#8B7E74" stroke-width="2" stroke-dasharray="4 3"/>
  <rect x="300" y="300" width="140" height="90" rx="4" fill="none" stroke="#8B7E74" stroke-width="2" stroke-dasharray="4 3"/>

  <!-- Screen labels -->
  <text x="150" y="110" font-family="monospace" font-size="11" fill="#8B7E74" text-anchor="middle">session_01</text>
  <text x="650" y="110" font-family="monospace" font-size="11" fill="#8B7E74" text-anchor="middle">session_02</text>
  <text x="690" y="300" font-family="monospace" font-size="11" fill="#8B7E74" text-anchor="middle">session_03</text>
  <text x="110" y="300" font-family="monospace" font-size="11" fill="#8B7E74" text-anchor="middle">session_04</text>
  <text x="370" y="350" font-family="monospace" font-size="11" fill="#8B7E74" text-anchor="middle">session_05</text>

  <!-- Central person -->
  <circle cx="400" cy="180" r="18" fill="#E8E2DC" stroke="#3D3530" stroke-width="2"/>
  <line x1="400" y1="198" x2="400" y2="240" stroke="#3D3530" stroke-width="2"/>
  <line x1="380" y1="215" x2="420" y2="215" stroke="#3D3530" stroke-width="2"/>

  <!-- Chaotic connection lines from person to screens -->
  <path d="M385 170 Q300 140 220 105" fill="none" stroke="#3D3530" stroke-width="2" stroke-dasharray="6 4"/>
  <path d="M415 170 Q500 130 580 105" fill="none" stroke="#3D3530" stroke-width="2" stroke-dasharray="6 4"/>
  <path d="M418 190 Q550 230 620 295" fill="none" stroke="#3D3530" stroke-width="2" stroke-dasharray="6 4"/>
  <path d="M382 190 Q250 240 180 295" fill="none" stroke="#3D3530" stroke-width="2" stroke-dasharray="6 4"/>
  <path d="M400 240 Q390 270 370 300" fill="none" stroke="#3D3530" stroke-width="2" stroke-dasharray="6 4"/>

  <!-- Arrow heads -->
  <polygon points="215,102 225,100 220,110" fill="#3D3530"/>
  <polygon points="580,102 575,112 585,108" fill="#3D3530"/>
  <polygon points="620,292 625,302 615,298" fill="#3D3530"/>
  <polygon points="180,292 175,302 185,298" fill="#3D3530"/>
  <polygon points="368,298 372,308 363,305" fill="#3D3530"/>

  <!-- Stress marks around person -->
  <line x1="430" y1="160" x2="438" y2="155" stroke="#8B7E74" stroke-width="1.5"/>
  <line x1="435" y1="170" x2="443" y2="168" stroke="#8B7E74" stroke-width="1.5"/>
  <line x1="370" y1="160" x2="362" y2="155" stroke="#8B7E74" stroke-width="1.5"/>
  <line x1="365" y1="170" x2="357" y2="168" stroke="#8B7E74" stroke-width="1.5"/>

  <!-- Caption -->
  <text x="400" y="30" font-family="monospace" font-size="13" fill="#3D3530" text-anchor="middle">you are the message bus</text>
</svg>