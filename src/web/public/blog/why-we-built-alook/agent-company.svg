  <circle cx="550" cy="365" r="2" fill="#E8E2DC"/>
  <circle cx="600" cy="360" r="2" fill="#E8E2DC"/>

  <!-- Scale label -->
  <text x="400" y="390" font-family="monospace" font-size="11" fill="#8B7E74" text-anchor="middle">one person, a thousand agents</text>
