<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <!-- Top: The User/Founder -->
  <circle cx="400" cy="70" r="26" fill="#E8E2DC" stroke="#3D3530" stroke-width="2"/>
  <text x="400" y="75" font-family="monospace" font-size="11" fill="#3D3530" text-anchor="middle">you</text>

  <!-- Hierarchical lines from user to agents -->
  <line x1="380" y1="94" x2="200" y2="170" stroke="#3D3530" stroke-width="2"/>
  <line x1="392" y1="96" x2="330" y2="170" stroke="#3D3530" stroke-width="2"/>
  <line x1="408" y1="96" x2="470" y2="170" stroke="#3D3530" stroke-width="2"/>
  <line x1="420" y1="94" x2="600" y2="170" stroke="#3D3530" stroke-width="2"/>

  <!-- Agent 1: Plan -->
  <circle cx="200" cy="190" r="20" fill="#C4B8AB" stroke="#3D3530" stroke-width="2"/>
  <text x="200" y="195" font-family="monospace" font-size="10" fill="#3D3530" text-anchor="middle">plan</text>

  <!-- Agent 2: Code -->
  <circle cx="330" cy="190" r="20" fill="#C4B8AB" stroke="#3D3530" stroke-width="2"/>
  <text x="330" y="195" font-family="monospace" font-size="10" fill="#3D3530" text-anchor="middle">code</text>

  <!-- Agent 3: Ship -->
  <circle cx="470" cy="190" r="20" fill="#C4B8AB" stroke="#3D3530" stroke-width="2"/>
  <text x="470" y="195" font-family="monospace" font-size="10" fill="#3D3530" text-anchor="middle">ship</text>

  <!-- Agent 4: Market -->
  <circle cx="600" cy="190" r="20" fill="#C4B8AB" stroke="#3D3530" stroke-width="2"/>
  <text x="600" y="195" font-family="monospace" font-size="10" fill="#3D3530" text-anchor="middle">mkt</text>

  <!-- Lines from agents to sub-nodes -->
  <!-- Plan sub-nodes -->
  <line x1="188" y1="208" x2="150" y2="270" stroke="#8B7E74" stroke-width="1.5"/>
  <line x1="200" y1="210" x2="200" y2="270" stroke="#8B7E74" stroke-width="1.5"/>
  <line x1="212" y1="208" x2="250" y2="270" stroke="#8B7E74" stroke-width="1.5"/>

  <!-- Code sub-nodes -->
  <line x1="318" y1="208" x2="290" y2="270" stroke="#8B7E74" stroke-width="1.5"/>
  <line x1="330" y1="210" x2="330" y2="270" stroke="#8B7E74" stroke-width="1.5"/>
  <line x1="342" y1="208" x2="370" y2="270" stroke="#8B7E74" stroke-width="1.5"/>

  <!-- Ship sub-nodes -->
  <line x1="458" y1="208" x2="430" y2="270" stroke="#8B7E74" stroke-width="1.5"/>
  <line x1="470" y1="210" x2="470" y2="270" stroke="#8B7E74" stroke-width="1.5"/>
  <line x1="482" y1="208" x2="510" y2="270" stroke="#8B7E74" stroke-width="1.5"/>

  <!-- Market sub-nodes -->
  <line x1="588" y1="208" x2="560" y2="270" stroke="#8B7E74" stroke-width="1.5"/>
  <line x1="600" y1="210" x2="600" y2="270" stroke="#8B7E74" stroke-width="1.5"/>
  <line x1="612" y1="208" x2="640" y2="270" stroke="#8B7E74" stroke-width="1.5"/>

