<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <!-- LEFT SIDE: Project-centric (cramped) -->
  <!-- Container rectangle -->
  <rect x="60" y="80" width="240" height="240" rx="6" fill="#E8E2DC" stroke="#3D3530" stroke-width="2"/>
  <text x="180" y="60" font-family="monospace" font-size="12" fill="#8B7E74" text-anchor="middle">project-centric</text>

  <!-- Agents crammed inside -->
  <circle cx="120" cy="140" r="16" fill="#C4B8AB" stroke="#3D3530" stroke-width="2"/>
  <circle cx="180" cy="130" r="16" fill="#C4B8AB" stroke="#3D3530" stroke-width="2"/>
  <circle cx="240" cy="145" r="16" fill="#C4B8AB" stroke="#3D3530" stroke-width="2"/>
  <circle cx="100" cy="200" r="16" fill="#C4B8AB" stroke="#3D3530" stroke-width="2"/>
  <circle cx="160" cy="210" r="16" fill="#C4B8AB" stroke="#3D3530" stroke-width="2"/>
  <circle cx="220" cy="195" r="16" fill="#C4B8AB" stroke="#3D3530" stroke-width="2"/>
  <circle cx="270" cy="210" r="16" fill="#C4B8AB" stroke="#3D3530" stroke-width="2"/>
  <circle cx="140" cy="270" r="16" fill="#C4B8AB" stroke="#3D3530" stroke-width="2"/>
  <circle cx="200" cy="280" r="16" fill="#C4B8AB" stroke="#3D3530" stroke-width="2"/>
  <circle cx="260" cy="270" r="16" fill="#C4B8AB" stroke="#3D3530" stroke-width="2"/>

  <!-- Overlap/collision marks -->
  <line x1="145" y1="135" x2="155" y2="130" stroke="#8B7E74" stroke-width="1.5"/>
  <line x1="205" y1="140" x2="215" y2="145" stroke="#8B7E74" stroke-width="1.5"/>
  <line x1="130" y1="200" x2="135" y2="210" stroke="#8B7E74" stroke-width="1.5"/>

  <!-- VS divider -->
  <line x1="400" y1="100" x2="400" y2="300" stroke="#C4B8AB" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="400" y="210" font-family="monospace" font-size="14" fill="#8B7E74" text-anchor="middle">vs</text>

  <!-- RIGHT SIDE: Agent-centric (organized) -->
  <text x="620" y="60" font-family="monospace" font-size="12" fill="#8B7E74" text-anchor="middle">agent-centric</text>

  <!-- Agent 1 with its own space -->
  <rect x="480" y="90" width="80" height="80" rx="4" fill="none" stroke="#C4B8AB" stroke-width="1.5"/>
  <circle cx="520" cy="130" r="16" fill="#C4B8AB" stroke="#3D3530" stroke-width="2"/>

  <!-- Agent 2 with its own space -->
  <rect x="580" y="90" width="80" height="80" rx="4" fill="none" stroke="#C4B8AB" stroke-width="1.5"/>
  <circle cx="620" cy="130" r="16" fill="#C4B8AB" stroke="#3D3530" stroke-width="2"/>

  <!-- Agent 3 with its own space -->
  <rect x="680" y="90" width="80" height="80" rx="4" fill="none" stroke="#C4B8AB" stroke-width="1.5"/>
  <circle cx="720" cy="130" r="16" fill="#C4B8AB" stroke="#3D3530" stroke-width="2"/>

  <!-- Agent 4 with its own space -->
  <rect x="530" y="220" width="80" height="80" rx="4" fill="none" stroke="#C4B8AB" stroke-width="1.5"/>
  <circle cx="570" cy="260" r="16" fill="#C4B8AB" stroke="#3D3530" stroke-width="2"/>

  <!-- Agent 5 with its own space -->
  <rect x="630" y="220" width="80" height="80" rx="4" fill="none" stroke="#C4B8AB" stroke-width="1.5"/>
  <circle cx="670" cy="260" r="16" fill="#C4B8AB" stroke="#3D3530" stroke-width="2"/>

  <!-- Clean connection lines between agents on right -->
  <line x1="536" y1="130" x2="604" y2="130" stroke="#3D3530" stroke-width="1.5"/>
  <line x1="636" y1="130" x2="704" y2="130" stroke="#3D3530" stroke-width="1.5"/>
  <line x1="535" y1="170" x2="555" y2="220" stroke="#3D3530" stroke-width="1.5"/>
  <line x1="635" y1="170" x2="655" y2="220" stroke="#3D3530" stroke-width="1.5"/>
  <line x1="586" y1="260" x2="654" y2="260" stroke="#3D3530" stroke-width="1.5"/>
</svg>