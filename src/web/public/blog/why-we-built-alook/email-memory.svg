<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <!-- Agent A -->
  <circle cx="260" cy="100" r="24" fill="#E8E2DC" stroke="#3D3530" stroke-width="2"/>
  <text x="260" y="105" font-family="monospace" font-size="11" fill="#3D3530" text-anchor="middle">A</text>
  <text x="260" y="60" font-family="monospace" font-size="10" fill="#8B7E74" text-anchor="middle">agent</text>

  <!-- Agent B -->
  <circle cx="540" cy="100" r="24" fill="#E8E2DC" stroke="#3D3530" stroke-width="2"/>
  <text x="540" y="105" font-family="monospace" font-size="11" fill="#3D3530" text-anchor="middle">B</text>
  <text x="540" y="60" font-family="monospace" font-size="10" fill="#8B7E74" text-anchor="middle">agent</text>

  <!-- Envelope icon between them -->
  <rect x="370" y="80" width="60" height="40" rx="3" fill="#C4B8AB" stroke="#3D3530" stroke-width="2"/>
  <polyline points="370,80 400,105 430,80" fill="none" stroke="#3D3530" stroke-width="2"/>

  <!-- Connection lines from agents to envelope -->
  <line x1="284" y1="100" x2="370" y2="100" stroke="#3D3530" stroke-width="2"/>
  <line x1="430" y1="100" x2="516" y2="100" stroke="#3D3530" stroke-width="2"/>

  <!-- Arrow from envelope down to timeline -->
  <line x1="400" y1="120" x2="400" y2="160" stroke="#3D3530" stroke-width="2"/>
  <polygon points="395,158 400,168 405,158" fill="#3D3530"/>

  <!-- Timeline vertical line -->
  <line x1="400" y1="170" x2="400" y2="370" stroke="#3D3530" stroke-width="2"/>

  <!-- Timeline dots with timestamps -->
  <circle cx="400" cy="190" r="5" fill="#3D3530"/>
  <text x="430" y="194" font-family="monospace" font-size="10" fill="#8B7E74">day 1</text>

  <circle cx="400" cy="230" r="5" fill="#3D3530"/>
  <text x="430" y="234" font-family="monospace" font-size="10" fill="#8B7E74">day 3</text>

  <circle cx="400" cy="270" r="5" fill="#3D3530"/>
  <text x="430" y="274" font-family="monospace" font-size="10" fill="#8B7E74">day 5</text>

  <circle cx="400" cy="310" r="5" fill="#3D3530"/>
  <text x="430" y="314" font-family="monospace" font-size="10" fill="#8B7E74">day 8</text>

  <circle cx="400" cy="350" r="5" fill="#3D3530"/>
  <text x="430" y="354" font-family="monospace" font-size="10" fill="#8B7E74">day 14</text>

  <!-- Memory persistence indicator -->
  <rect x="180" y="250" width="120" height="30" rx="3" fill="none" stroke="#C4B8AB" stroke-width="1.5" stroke-dasharray="3 2"/>
  <text x="240" y="269" font-family="monospace" font-size="9" fill="#8B7E74" text-anchor="middle">1 week later...</text>
  <line x1="300" y1="265" x2="395" y2="290" stroke="#C4B8AB" stroke-width="1" stroke-dasharray="3 2"/>

  <!-- Thread still intact label -->
  <rect x="500" y="320" width="140" height="30" rx="3" fill="none" stroke="#C4B8AB" stroke-width="1.5" stroke-dasharray="3 2"/>
  <text x="570" y="339" font-family="monospace" font-size="9" fill="#8B7E74" text-anchor="middle">thread still intact</text>
  <line x1="500" y1="335" x2="410" y2="350" stroke="#C4B8AB" stroke-width="1" stroke-dasharray="3 2"/>

  <!-- Subtle background shape -->
  <rect x="360" y="165" width="80" height="215" rx="40" fill="none" stroke="#E8E2DC" stroke-width="8" opacity="0.5"/>
</svg>